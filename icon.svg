<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#fdf6e3"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#f5e8c8"/>
  <!-- Decorative border -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="#b8860b" stroke-width="8" opacity="0.5"/>
  <rect x="48" y="48" width="416" height="416" rx="68" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.3"/>
  <!-- Red seal background -->
  <rect x="120" y="100" width="272" height="312" rx="12" fill="#9b1b1b"/>
  <!-- Inner seal border -->
  <rect x="132" y="112" width="248" height="288" rx="8" fill="none" stroke="#e8c95d" stroke-width="4"/>
